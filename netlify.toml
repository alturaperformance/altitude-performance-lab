[build]
  base    = ""
  command = "cd calculator && npm install && npm run build && cd .. && npm install && npx @11ty/eleventy"
  publish = "."

[build.environment]
  NODE_VERSION = "22"

# Cache static assets aggressively
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"
